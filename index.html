<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVS2</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="div-titulo">
            <h1>Registro colaboradores</h1>
        </div>
    </header>
    <main>
        <section>
            <div class="div-form">
                <h2>Ingresa un colaborador</h2>
                    <form action="">
                        <div class="div-nombre">
                            <div id="error-nombre"></div>
                            <label for="nombre">Nombre: </label>
                            <input type="text" id="nombre" name="nombre" required>
                        </div>
                        <br>
                        <div class="div-apellido">
                            <div id="error-apellido"></div>
                            <label for="apellido">Apellido: </label>
                            <input type="text" id="apellido" name="apellido" required>
                        </div>
                        <br>
                        <div class="div-cargo">
                            <div id="error-cargo"></div>
                            <label for="cargo">Cargo: </label>
                            <input type="text" id="cargo" name="cargo" required>
                        </div>
                        <br>
                        <div class="div-email">
                            <div id="error-correo"></div>
                            <label for="correo">Correo: </label>
                            <input type="email" id="correo" name="correo" required>
                        </div>
                        <br>
                        <div class="div-boton"></div>
                            <button id="boton-guardar" type="submit">Guardar</button>
                    </form>
            </div>
        </section>

        <aside>
            <div class="panel-tabla">
                <h2>colaboradores registrados</h2>
                <div class="div-filtro">
                    <input type="text" name="busqueda" id="busqueda" placeholder="Filtrar por nombre o cargo">
                </div>                
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Apellido</th>
                            <th>Cargo</th>
                            <th>Correo Corporativo</th>
                        </tr>
                    </thead>
                    <tbody id="fila-colaboradores">

                    </tbody>
                </table>
            </div>
        </aside>


    </main>

    <footer>
        <p>Rodrigo Rodriguez a</p>
    </footer>

    <script src="scripts.js"></script>
</body>
</html>
